<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="brainGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#0a0a0a"/>
  
  <!-- Outer ring - represents continuous memory -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#brainGlow)" stroke-width="3" opacity="0.6"/>
  
  <!-- Memory trace paths - stylized engram pattern -->
  <g fill="none" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central spiral/trace -->
    <path d="M 60 100 Q 80 70, 100 70 Q 130 70, 130 100 Q 130 130, 100 130 Q 75 130, 75 105" opacity="0.9"/>
    
    <!-- Memory nodes -->
    <circle cx="60" cy="100" r="8" fill="#22D3EE"/>
    <circle cx="100" cy="70" r="6" fill="#8B5CF6"/>
    <circle cx="130" cy="100" r="7" fill="#22D3EE"/>
    <circle cx="100" cy="130" r="6" fill="#8B5CF6"/>
    <circle cx="75" cy="105" r="5" fill="#22D3EE"/>
    
    <!-- Connection lines - neural pathways -->
    <line x1="60" y1="100" x2="45" y2="85" stroke="#22D3EE" stroke-width="2" opacity="0.5"/>
    <line x1="130" y1="100" x2="150" y2="115" stroke="#22D3EE" stroke-width="2" opacity="0.5"/>
    <line x1="100" y1="70" x2="100" y2="50" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
    <line x1="100" y1="130" x2="115" y2="150" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Pulse effect in center -->
  <circle cx="100" cy="100" r="15" fill="none" stroke="#22D3EE" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="100" r="8" fill="#22D3EE" opacity="0.8"/>
  <circle cx="100" cy="100" r="4" fill="#ffffff"/>
</svg>
