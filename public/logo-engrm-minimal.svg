<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="200" height="200" rx="40" fill="#09090b"/>
  
  <!-- Stylized "E" made of memory traces -->
  <g stroke="url(#glowGrad)" stroke-width="8" stroke-linecap="round" fill="none">
    <!-- Vertical spine -->
    <path d="M 70 50 L 70 150"/>
    
    <!-- Top horizontal with memory node -->
    <path d="M 70 50 L 130 50"/>
    <circle cx="130" cy="50" r="6" fill="#22D3EE"/>
    
    <!-- Middle horizontal (shorter) with pulse -->
    <path d="M 70 100 L 115 100"/>
    <circle cx="115" cy="100" r="8" fill="#22D3EE"/>
    <circle cx="115" cy="100" r="4" fill="#fff"/>
    
    <!-- Bottom horizontal with memory node -->
    <path d="M 70 150 L 130 150"/>
    <circle cx="130" cy="150" r="6" fill="#22D3EE"/>
  </g>
  
  <!-- Subtle connection lines -->
  <g stroke="#22D3EE" stroke-width="2" opacity="0.3">
    <line x1="130" y1="50" x2="145" y2="35"/>
    <line x1="115" y1="100" x2="140" y2="100"/>
    <line x1="130" y1="150" x2="145" y2="165"/>
  </g>
</svg>
