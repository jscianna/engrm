<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Modern asymmetric E letterform -->
  <rect width="200" height="200" fill="#09090b"/>
  
  <!-- Asymmetric E made of different weight bars -->
  <g fill="#22D3EE">
    <!-- Vertical bar (thick) -->
    <rect x="50" y="45" width="16" height="110" rx="4"/>
    
    <!-- Top bar (medium, extends far) -->
    <rect x="50" y="45" width="95" height="10" rx="3"/>
    
    <!-- Middle bar (thin, shorter) -->
    <rect x="50" y="95" width="70" height="8" rx="2"/>
    
    <!-- Bottom bar (medium, different length) -->
    <rect x="50" y="145" width="85" height="10" rx="3"/>
  </g>
  
  <!-- Accent nodes (asymmetric placement) -->
  <circle cx="145" cy="50" r="8" fill="#8B5CF6"/>
  <circle cx="120" cy="99" r="6" fill="#8B5CF6" opacity="0.7"/>
  <circle cx="135" cy="150" r="7" fill="#8B5CF6" opacity="0.8"/>
  
  <!-- Glow dot -->
  <circle cx="145" cy="50" r="3" fill="#fff"/>
</svg>
