<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Asymmetric memory nodes - scattered constellation -->
  <rect width="200" height="200" fill="#09090b"/>
  
  <!-- Main large node (off-center left) -->
  <circle cx="65" cy="85" r="28" fill="#22D3EE"/>
  <circle cx="65" cy="85" r="14" fill="#09090b"/>
  <circle cx="65" cy="85" r="6" fill="#fff"/>
  
  <!-- Medium node (upper right) -->
  <circle cx="140" cy="55" r="18" fill="#8B5CF6"/>
  <circle cx="140" cy="55" r="8" fill="#09090b"/>
  <circle cx="140" cy="55" r="3" fill="#fff"/>
  
  <!-- Small nodes scattered -->
  <circle cx="120" cy="130" r="12" fill="#22D3EE" opacity="0.8"/>
  <circle cx="160" cy="110" r="8" fill="#8B5CF6" opacity="0.7"/>
  <circle cx="45" cy="145" r="10" fill="#22D3EE" opacity="0.6"/>
  <circle cx="95" cy="160" r="6" fill="#8B5CF6" opacity="0.5"/>
  
  <!-- Connection lines (asymmetric) -->
  <g stroke="#22D3EE" stroke-width="2" opacity="0.4">
    <line x1="65" y1="85" x2="140" y2="55"/>
    <line x1="65" y1="85" x2="120" y2="130"/>
    <line x1="140" y1="55" x2="160" y2="110"/>
    <line x1="120" y1="130" x2="95" y2="160"/>
    <line x1="65" y1="85" x2="45" y2="145"/>
  </g>
</svg>
