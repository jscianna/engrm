<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Asymmetric broken ring with nodes -->
  <rect width="200" height="200" fill="#09090b"/>
  
  <!-- Broken/incomplete ring (asymmetric) -->
  <g fill="none" stroke-width="6" stroke-linecap="round">
    <!-- Main arc (larger) -->
    <path d="M 45 130 A 60 60 0 0 1 155 100" stroke="#22D3EE"/>
    
    <!-- Secondary arc (smaller, offset) -->
    <path d="M 140 145 A 45 45 0 0 1 70 160" stroke="#8B5CF6" opacity="0.7"/>
  </g>
  
  <!-- Asymmetric nodes -->
  <circle cx="45" cy="130" r="14" fill="#22D3EE"/>
  <circle cx="45" cy="130" r="6" fill="#09090b"/>
  <circle cx="45" cy="130" r="2" fill="#fff"/>
  
  <circle cx="155" cy="100" r="10" fill="#22D3EE"/>
  <circle cx="155" cy="100" r="4" fill="#fff"/>
  
  <circle cx="100" cy="65" r="20" fill="#8B5CF6"/>
  <circle cx="100" cy="65" r="10" fill="#09090b"/>
  <circle cx="100" cy="65" r="4" fill="#fff"/>
  
  <!-- Small accent nodes -->
  <circle cx="70" cy="160" r="6" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="140" cy="145" r="5" fill="#22D3EE" opacity="0.5"/>
</svg>
