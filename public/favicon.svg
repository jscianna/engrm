<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0a0a0a"/>
  
  <!-- Memory nodes - interconnected -->
  <circle cx="16" cy="10" r="3" fill="#22d3ee"/>
  <circle cx="10" cy="20" r="2.5" fill="#22d3ee"/>
  <circle cx="22" cy="20" r="2.5" fill="#22d3ee"/>
  <circle cx="16" cy="24" r="2" fill="#22d3ee" opacity="0.7"/>
  
  <!-- Connections -->
  <line x1="16" y1="13" x2="11" y2="18" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
  <line x1="16" y1="13" x2="21" y2="18" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
  <line x1="12" y1="21" x2="20" y2="21" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
  <line x1="16" y1="22" x2="16" y2="24" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
  
  <!-- Glow effect on main node -->
