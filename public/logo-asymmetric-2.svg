<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Asymmetric wave/flow pattern -->
  <rect width="200" height="200" fill="#09090b"/>
  
  <!-- Flowing asymmetric curves -->
  <g fill="none" stroke-width="4" stroke-linecap="round">
    <!-- Main flowing line -->
    <path d="M 30 140 Q 60 80, 100 100 Q 150 125, 170 70" 
          stroke="#22D3EE"/>
    
    <!-- Secondary flow -->
    <path d="M 50 160 Q 90 110, 130 130 Q 160 145, 180 100" 
          stroke="#8B5CF6" opacity="0.7"/>
    
    <!-- Accent flow -->
    <path d="M 20 120 Q 50 60, 80 80" 
          stroke="#22D3EE" opacity="0.5"/>
  </g>
  
  <!-- Memory nodes at key points -->
  <circle cx="100" cy="100" r="12" fill="#22D3EE"/>
  <circle cx="100" cy="100" r="5" fill="#fff"/>
  
  <circle cx="170" cy="70" r="8" fill="#8B5CF6"/>
  <circle cx="30" cy="140" r="6" fill="#22D3EE" opacity="0.8"/>
  <circle cx="130" cy="130" r="5" fill="#8B5CF6" opacity="0.6"/>
</svg>
